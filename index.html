  <head>

    <meta name="description" content="Create and manage comprehensive brand guides" />

    <meta property="og:title" content="BrandHub" />

    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    <link rel="icon" type="image/png" href="https://storage.googleapis.com/gpt-engineer-file-uploads/RdqHig7jc1NrJ53XJVb7DKdOfQY2/uploads/1770586585368-TP-Tonly-colorwhiteT.png" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *,*::before,*::after{box-sizing:border-box}
      html{line-height:1.5;-webkit-text-size-adjust:100%;font-family:Poppins,Montserrat,ui-sans-serif,system-ui,sans-serif}
      body{margin:0;min-height:100vh}
      :root{--background:40 20% 98%;--foreground:220 20% 10%;--primary:220 15% 20%}
      .dark{--background:220 20% 8%;--foreground:40 20% 98%;--primary:40 20% 98%}
      body{background-color:hsl(var(--background));color:hsl(var(--foreground))}
      #root{min-height:100vh;display:flex;flex-direction:column}
      .initial-loader{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:1rem}
      .initial-loader svg{width:48px;height:48px;animation:spin 1s linear infinite}
      .initial-loader p{font-size:0.875rem;color:hsl(var(--foreground)/0.6)}
      @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
      .recovery-ui{display:none;text-align:center;max-width:400px;margin:0 auto;padding:2rem}
      .recovery-ui h2{font-size:1.25rem;font-weight:600;margin-bottom:0.5rem}
      .recovery-ui p{font-size:0.875rem;color:hsl(var(--foreground)/0.6);margin-bottom:1.5rem}
      .recovery-ui button{background:hsl(var(--foreground));color:hsl(var(--background));border:none;padding:0.75rem 2rem;border-radius:0.5rem;font-size:1rem;font-weight:600;cursor:pointer;font-family:inherit}
      .recovery-ui button:hover{opacity:0.9}
      .recovery-ui .error-detail{font-size:0.75rem;color:red;margin-top:1rem;word-break:break-all;max-height:100px;overflow:auto;text-align:left;background:hsl(var(--foreground)/0.05);padding:0.5rem;border-radius:0.25rem}
    </style>
  </head>
  <body>
    <div id="root">
      <!-- BrandHub v2.2 -->
      <div class="initial-loader" id="bhub-loader" aria-label="Loading">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
        <p>Loading BrandHub...</p>
      </div>
      <div class="recovery-ui" id="bhub-recovery">
        <h2>⚠️ BrandHub failed to load</h2>
        <p>This is usually caused by a stale browser cache. Click below to clear it and reload.</p>
        <button onclick="bhubForceRecover()">Clear Cache &amp; Reload</button>
        <div class="error-detail" id="bhub-error-detail" style="display:none"></div>
      </div>
    </div>
    <script>
      // ---- LAYER 1: Unregister stale service workers ----
      (function() {
        if (!('serviceWorker' in navigator)) return;
        var reloadKey = 'bhub_sw_cleanup_v4';
        if (sessionStorage.getItem(reloadKey)) return;
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          if (regs.length === 0) return;
          var tasks = regs.map(function(r) { return r.unregister(); });
          Promise.all(tasks).then(function() {
            if ('caches' in window) {
              caches.keys().then(function(names) {
                names.forEach(function(n) { caches.delete(n); });
              });
            }
            sessionStorage.setItem(reloadKey, '1');
            window.location.reload();
          });
        });
      })();

      // ---- LAYER 2: Capture JS errors before React loads ----
      var __bhubErrors = [];
      window.onerror = function(msg, src, line, col, err) {
        __bhubErrors.push(msg + ' at ' + src + ':' + line);
      };
      window.addEventListener('unhandledrejection', function(e) {
        __bhubErrors.push('Unhandled rejection: ' + (e.reason && e.reason.message || e.reason || 'unknown'));
      });

      // ---- LAYER 3: Timeout recovery — if React hasn't mounted in 12s, show recovery UI ----
      setTimeout(function() {
        var root = document.getElementById('root');
        // React replaces the initial-loader content when it mounts
        var loader = document.getElementById('bhub-loader');
        if (loader && loader.parentNode === root) {
          // React never mounted — show recovery
          loader.style.display = 'none';
          var recovery = document.getElementById('bhub-recovery');
          if (recovery) {
            recovery.style.display = 'block';
            if (__bhubErrors.length > 0) {
              var detail = document.getElementById('bhub-error-detail');
              if (detail) {
                detail.style.display = 'block';
                detail.textContent = __bhubErrors.join('\n');
              }
            }
          }
        }
      }, 12000);

      // ---- Recovery function ----
      function bhubForceRecover() {
        // Unregister all SWs
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
          });
        }
        // Clear all caches
        if ('caches' in window) {
          caches.keys().then(function(names) {
            names.forEach(function(n) { caches.delete(n); });
          });
        }
        // Clear storage
        try { localStorage.clear(); } catch(e) {}
        try { sessionStorage.clear(); } catch(e) {}
        // Force reload bypassing cache
        setTimeout(function() {
          window.location.href = window.location.origin + window.location.pathname + '?_bust=' + Date.now();
        }, 500);
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
