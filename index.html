    <style>
      *,*::before,*::after{box-sizing:border-box}
      html{line-height:1.5;-webkit-text-size-adjust:100%;font-family:Poppins,Montserrat,ui-sans-serif,system-ui,sans-serif}
      body{margin:0;min-height:100vh}
      :root{--background:40 20% 98%;--foreground:220 20% 10%;--primary:220 15% 20%}
      .dark{--background:220 20% 8%;--foreground:40 20% 98%;--primary:40 20% 98%}
      body{background-color:hsl(var(--background));color:hsl(var(--foreground))}
      #root{min-height:100vh;display:flex;flex-direction:column}
      .initial-loader{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:1rem}
      .initial-loader svg{width:48px;height:48px;animation:spin 1s linear infinite}
      .initial-loader p{font-size:0.875rem;color:hsl(var(--foreground)/0.6)}
      @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    </style>
  </head>
  <body>
    <div id="root">
      <!-- BrandHub v2.1 -->
      <div class="initial-loader" aria-label="Loading">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
        <p>Loading BrandHub...</p>
      </div>
    </div>
    <script>
      // NUCLEAR: Unregister ALL stale service workers and clear caches.
      // This breaks the cycle where an old SW serves broken cached HTML.
      (function() {
        if (!('serviceWorker' in navigator)) return;
        // Check if we already did a cleanup reload to avoid infinite loops
        var reloadKey = 'bhub_sw_cleanup_v3';
        if (sessionStorage.getItem(reloadKey)) return;
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          if (regs.length === 0) return;
          var tasks = regs.map(function(r) { return r.unregister(); });
          Promise.all(tasks).then(function() {
            // Also clear all caches
            if ('caches' in window) {
              caches.keys().then(function(names) {
                names.forEach(function(n) { caches.delete(n); });
              });
            }
            sessionStorage.setItem(reloadKey, '1');
            window.location.reload();
          });
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
