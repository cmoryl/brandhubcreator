    <noscript><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" /></noscript>
    <style>
      *,*::before,*::after{box-sizing:border-box}
      html{line-height:1.5;-webkit-text-size-adjust:100%;font-family:Geist,Poppins,Montserrat,ui-sans-serif,system-ui,sans-serif}
      body{margin:0;min-height:100vh}
      :root{--background:40 20% 98%;--foreground:220 20% 10%;--primary:220 15% 20%}
      .dark{--background:220 20% 8%;--foreground:40 20% 98%;--primary:40 20% 98%}
      body{background-color:hsl(var(--background));color:hsl(var(--foreground))}
      #root{min-height:100vh;display:flex;flex-direction:column}
      .initial-loader{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:1.5rem;padding:2rem}
      .il-logo{width:64px;height:64px;position:relative}
      .il-ring{position:absolute;inset:0;border-radius:16px;border:2px solid;opacity:0.2;animation:ilspin 8s linear infinite}
      .il-ring-inner{position:absolute;inset:8px;border-radius:12px;border:2px solid;opacity:0.3;animation:ilspin 6s linear infinite reverse}
      .il-center{position:absolute;inset:16px;border-radius:8px;display:flex;align-items:center;justify-content:center}
      .il-shimmer{width:200px;height:4px;border-radius:9999px;overflow:hidden;position:relative}
      .il-shimmer::after{content:'';position:absolute;inset:0;animation:ilshimmer 2s ease-in-out infinite;background-size:200% 100%}
      .il-text{font-size:1rem;font-weight:500;letter-spacing:-0.01em}
      .il-sub{font-size:0.8rem;opacity:0.5;margin-top:-0.5rem}
      /* Light mode initial loader */
      .il-ring{border-color:hsl(220 15% 20%)}
      .il-ring-inner{border-color:hsl(220 15% 20%)}
      .il-center{background:linear-gradient(135deg,hsl(220 15% 20%/0.08),hsl(220 15% 20%/0.04))}
      .il-shimmer{background:hsl(var(--foreground)/0.08)}
      .il-shimmer::after{background:linear-gradient(90deg,transparent,hsl(220 15% 20%/0.3),transparent)}
      /* Dark mode initial loader */
      .dark .il-ring{border-color:hsl(195 90% 60%)}
      .dark .il-ring-inner{border-color:hsl(195 90% 60%)}
      .dark .il-center{background:linear-gradient(135deg,hsl(195 90% 60%/0.1),hsl(260 60% 65%/0.08))}
      .dark .il-shimmer{background:hsl(var(--foreground)/0.06)}
      .dark .il-shimmer::after{background:linear-gradient(90deg,transparent,hsl(195 90% 60%/0.4),transparent)}
      @keyframes ilspin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
      @keyframes ilshimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
      .recovery-ui{display:none;text-align:center;max-width:400px;margin:0 auto;padding:2rem}
      .recovery-ui h2{font-size:1.25rem;font-weight:600;margin-bottom:0.5rem}
      .recovery-ui p{font-size:0.875rem;color:hsl(var(--foreground)/0.6);margin-bottom:1.5rem}
      .recovery-ui button{background:hsl(var(--foreground));color:hsl(var(--background));border:none;padding:0.75rem 2rem;border-radius:0.5rem;font-size:1rem;font-weight:600;cursor:pointer;font-family:inherit}
      .recovery-ui button:hover{opacity:0.9}
      .recovery-ui .error-detail{font-size:0.75rem;color:red;margin-top:1rem;word-break:break-all;max-height:100px;overflow:auto;text-align:left;background:hsl(var(--foreground)/0.05);padding:0.5rem;border-radius:0.25rem}
    </style>
  </head>
  <body>
    <div id="root">
      <!-- BrandHub v2.2 -->
      <div class="initial-loader" id="bhub-loader" aria-label="Loading">
        <div class="il-logo">
          <div class="il-ring"></div>
          <div class="il-ring-inner"></div>
          <div class="il-center">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          </div>
        </div>
        <p class="il-text">BrandHub</p>
        <p class="il-sub">Preparing your experience</p>
        <div class="il-shimmer"></div>
      </div>
      <div class="recovery-ui" id="bhub-recovery">
        <h2>⚠️ BrandHub failed to load</h2>
        <p>This is usually caused by a stale browser cache. Click below to clear it and reload.</p>
        <button onclick="bhubForceRecover()">Clear Cache &amp; Reload</button>
        <div class="error-detail" id="bhub-error-detail" style="display:none"></div>
      </div>
    </div>
    <script>if('scrollRestoration' in history)history.scrollRestoration='manual';window.scrollTo(0,0);</script>
    <script>
      // ---- LAYER 1: Non-destructive service worker health check ----
      (function() {
        if (!('serviceWorker' in navigator)) return;
        window.addEventListener('load', function() {
          navigator.serviceWorker.getRegistration().then(function(reg) {
            if (!reg) return;
            reg.update().catch(function() {
              // Keep silent; manual recovery remains available.
            });
          });
        });
      })();

      // ---- LAYER 2: Capture JS errors before React loads ----
      var __bhubErrors = [];
      window.onerror = function(msg, src, line, col, err) {
        __bhubErrors.push(msg + ' at ' + src + ':' + line);
      };
      window.addEventListener('unhandledrejection', function(e) {
        __bhubErrors.push('Unhandled rejection: ' + (e.reason && e.reason.message || e.reason || 'unknown'));
      });

      // ---- LAYER 3: Timeout recovery — if React hasn't mounted in 45s, show recovery UI ----
      // Increased from 20s to 45s to accommodate large apps with many lazy chunks
      setTimeout(function() {
        var root = document.getElementById('root');
        var loader = document.getElementById('bhub-loader');
        if (loader && loader.parentNode === root) {
          loader.style.display = 'none';
          var recovery = document.getElementById('bhub-recovery');
          if (recovery) {
            recovery.style.display = 'block';
            if (__bhubErrors.length > 0) {
              var detail = document.getElementById('bhub-error-detail');
              if (detail) {
                detail.style.display = 'block';
                detail.textContent = __bhubErrors.join('\n');
              }
            }
          }
        }
      }, 45000);

      // ---- Recovery function ----
      function bhubForceRecover() {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
          });
        }

        if ('caches' in window) {
          caches.keys().then(function(names) {
            names.forEach(function(n) { caches.delete(n); });
          });
        }

        setTimeout(function() {
          window.location.replace(window.location.origin + window.location.pathname + '?_bust=' + Date.now());
        }, 500);
      }
    </script>
    <!-- model-viewer loaded dynamically by ARPreviewPanel when needed -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
